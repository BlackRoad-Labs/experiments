name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Smoke-test benchmark_runner demo
        run: python -m src.benchmark_runner demo --iterations 20 --no-memory

      - name: Smoke-test pipeline demo
        run: python -m src.pipeline demo --runs 1

      - name: Smoke-test experiment_tracker demo
        run: python -m src.experiment_tracker demo
